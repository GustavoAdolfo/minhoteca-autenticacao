name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -migrate-state --backend-config=default.conf || terraform init --backend-config=default.conf -reconfigure || terraform init --backend-config=default.conf

      - name: Terraform Validate
        run: terraform validate

  create-pr-to-main:
    name: "Create PR to Main"
    needs: build-and-test # Garante que o PR só será aberto se o build e os testes passarem
    runs-on: ubuntu-latest
    # Executa este job SOMENTE quando houver um push/merge na branch develop
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    permissions:
      pull-requests: write # Permissão necessária para o bot do GitHub abrir o PR
      contents: read

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessário para obter o histórico da branch main

      - name: Create Pull Request via GitHub CLI
        env:
          GH_TOKEN: ${{  secrets.GITHUB_TOKEN  }}
        run: |
          git fetch origin main

  terraform:
    name: "Terraform Deploy"
    needs: build-and-test # Garante que o deploy só rode se os testes passarem
    runs-on: ubuntu-latest
    # Executa este job SOMENTE quando houver um push na branch main
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: prod

    permissions:
      id-token: write # Necessário para interagir com o OIDC da AWS
      contents: read

    defaults:
      run:
        # Define o diretório onde os comandos do Terraform serão executados
        working-directory: envs/prod

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Credenciais da AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{  secrets.AWS_ACCOUNT_ID  }}:role/GitHubActionMinhoteca
          aws-region: ${{  secrets.AWS_REGION  }}
          role-session-name: GitHubActionsTerraformDeploy
          disable-retry: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -migrate-state --backend-config=default.conf || terraform init --backend-config=default.conf -reconfigure || terraform init --backend-config=default.conf

      - name: Terraform Plan
        env:
          TF_VAR_appregistry_id: ${{ vars.appregistry_id }}
          TF_VAR_access_token_validity: ${{ vars.access_token_validity }}
          TF_VAR_css_file_path: ${{ vars.css_file_path }}
          TF_VAR_logo_file_path: ${{ vars.logo_file_path }}
          TF_VAR_default_name: ${{ vars.default_name }}
          TF_VAR_deletion_protection: ${{ vars.deletion_protection }}
          TF_VAR_default_email: ${{ vars.default_email }}
          TF_VAR_mfa_configuration: ${{ vars.mfa_configuration }}
          TF_VAR_reply_to_email_address: ${{ vars.reply_to_email_address }}
          TF_VAR_ses_verified_email_account: ${{ vars.ses_verified_email_account }}
          TF_VAR_id_token_validity: ${{ vars.id_token_validity }}
          TF_VAR_refresh_token_validity: ${{ vars.refresh_token_validity }}
          TF_VAR_unit_access_token: ${{ vars.unit_access_token }}
          TF_VAR_unit_id_token: ${{ vars.unit_id_token }}
          TF_VAR_unit_refresh_token: ${{ vars.unit_refresh_token }}
          TF_VAR_callback_urls: ${{ vars.callback_urls }}
          TF_VAR_default_redirect: ${{ vars.default_redirect }}
          TF_VAR_logout_urls: ${{ vars.logout_urls }}
          TF_VAR_lambda_trigger_name: ${{ vars.lambda_trigger_name }}
          TF_VAR_kms_key_id: ${{ vars.kms_key_id }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        # O auto-approve é essencial em ambientes de CI/CD pois não há interação humana
        env:
          TF_VAR_appregistry_id: ${{ vars.appregistry_id }}
          TF_VAR_access_token_validity: ${{ vars.access_token_validity }}
          TF_VAR_css_file_path: ${{ vars.css_file_path }}
          TF_VAR_logo_file_path: ${{ vars.logo_file_path }}
          TF_VAR_default_name: ${{ vars.default_name }}
          TF_VAR_deletion_protection: ${{ vars.deletion_protection }}
          TF_VAR_default_email: ${{ vars.default_email }}
          TF_VAR_mfa_configuration: ${{ vars.mfa_configuration }}
          TF_VAR_reply_to_email_address: ${{ vars.reply_to_email_address }}
          TF_VAR_ses_verified_email_account: ${{ vars.ses_verified_email_account }}
          TF_VAR_id_token_validity: ${{ vars.id_token_validity }}
          TF_VAR_refresh_token_validity: ${{ vars.refresh_token_validity }}
          TF_VAR_unit_access_token: ${{ vars.unit_access_token }}
          TF_VAR_unit_id_token: ${{ vars.unit_id_token }}
          TF_VAR_unit_refresh_token: ${{ vars.unit_refresh_token }}
          TF_VAR_callback_urls: ${{ vars.callback_urls }}
          TF_VAR_default_redirect: ${{ vars.default_redirect }}
          TF_VAR_logout_urls: ${{ vars.logout_urls }}
          TF_VAR_lambda_trigger_name: ${{ vars.lambda_trigger_name }}
          TF_VAR_kms_key_id: ${{ vars.kms_key_id }}
        run: terraform apply -auto-approve tfplan
